name: Check for broken links

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          fail: true
          # Restrict checking to repo content that matters for this site.
          # Template docs and sample collections are excluded because they are not published here
          # and GitHub occasionally returns transient 502s for perfectly valid links.
          args: --exclude-path 'README\.md' --exclude-path 'CONTRIBUTING\.md' --exclude-path 'CUSTOMIZE\.md' --exclude-path 'FAQ\.md' --exclude-path 'INSTALL\.md' --exclude-path '_pages/404\.md' --exclude-path '_pages/blog\.md' --exclude-path '_posts/.*' --exclude-path '_projects/.*' --verbose --no-progress './**/*.md' './**/*.html'
